<!-- reports.html -->

<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransEdu - Reports</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f4f7ff;
        }
    </style>
</head>

<body>

    <header class="bg-[#003f87] text-white p-5 shadow-md flex justify-between items-center">
        <h1 class="text-2xl font-bold">Reports</h1>

        <a href="dashboard.html" class="bg-white text-[#003f87] px-4 py-2 rounded-full font-semibold">
            Dashboard
        </a>
    </header>

    <main class="p-6">

        <div class="grid md:grid-cols-3 gap-5 mb-6">

            <div class="bg-white rounded-3xl p-6 shadow-lg">
                <p class="text-gray-500">Total Perjalanan</p>
                <h2 class="text-4xl font-bold text-[#003f87] mt-2">54</h2>
            </div>

            <div class="bg-white rounded-3xl p-6 shadow-lg">
                <p class="text-gray-500">Subsidi Dipakai</p>
                <h2 class="text-4xl font-bold text-[#003f87] mt-2">Rp 420K</h2>
            </div>

            <div class="bg-white rounded-3xl p-6 shadow-lg">
                <p class="text-gray-500">Transport Favorit</p>
                <h2 class="text-2xl font-bold text-[#003f87] mt-2">TransJakarta</h2>
            </div>

        </div>

        <div class="bg-white rounded-3xl p-6 shadow-lg">

            <h3 class="text-2xl font-bold text-[#003f87] mb-6">
                Riwayat Perjalanan
            </h3>

            <div class="space-y-4">

                <div class="flex justify-between items-center bg-gray-50 p-4 rounded-2xl">
                    <div>
                        <h4 class="font-semibold">TransJakarta Koridor 1</h4>
                        <p class="text-sm text-gray-500">07:15 WIB</p>
                    </div>

                    <span class="text-[#003f87] font-bold">
                        Rp 3.500
                    </span>
                </div>

                <div class="flex justify-between items-center bg-gray-50 p-4 rounded-2xl">
                    <div>
                        <h4 class="font-semibold">MRT Jakarta</h4>
                        <p class="text-sm text-gray-500">16:30 WIB</p>
                    </div>

                    <span class="text-[#003f87] font-bold">
                        Rp 7.000
                    </span>
                </div>

            </div>

        </div>

    </main>

</body>

</html>
