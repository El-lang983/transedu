<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransEdu - Profile</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f4f7ff;
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header class="bg-[#003f87] text-white p-5 shadow-md flex justify-between items-center">

        <h1 class="text-2xl font-bold">
            Profile
        </h1>

        <!-- BALIK KE MENU UTAMA -->
        <a href="Dashboard.html"
            class="bg-white text-[#003f87] px-4 py-2 rounded-full font-semibold hover:scale-105 transition">

            Dashboard

        </a>

    </header>

    <main class="p-6">

        <div class="bg-white rounded-3xl shadow-lg p-8 max-w-2xl mx-auto">

            <!-- FOTO PROFIL -->
            <div class="flex flex-col items-center text-center">

                <!-- FOTO DEFAULT -->
                <img id="profilePreview" src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
                    class="w-32 h-32 rounded-full object-cover border-4 border-[#003f87] shadow-md">

                <!-- INPUT FOTO -->
                <label
                    class="mt-5 bg-[#003f87] text-white px-5 py-3 rounded-2xl cursor-pointer hover:opacity-90 transition">

                    Ganti Foto

                    <input type="file" id="profileInput" accept="image/*" class="hidden">

                </label>

                <h2 class="text-3xl font-bold mt-6 text-[#003f87]">
                    TransEdu Students
                </h2>

                <p class="text-gray-500">
                    Pelajar Aktif
                </p>

            </div>

            <!-- FORM -->
            <div class="mt-8 space-y-5">

                <div>
                    <label class="text-gray-500 text-sm">
                        Email
                    </label>

                    <input type="text" value="fatir@transedu.id"
                        class="w-full mt-2 border rounded-2xl px-4 py-3 outline-none focus:border-[#003f87]">
                </div>

                <div>
                    <label class="text-gray-500 text-sm">
                        Nomor Pelajar
                    </label>

                    <input type="text" value="29402"
                        class="w-full mt-2 border rounded-2xl px-4 py-3 outline-none focus:border-[#003f87]">
                </div>

                <div>
                    <label class="text-gray-500 text-sm">
                        Sekolah
                    </label>

                    <input type="text" value="SMK Teknologi Indonesia"
                        class="w-full mt-2 border rounded-2xl px-4 py-3 outline-none focus:border-[#003f87]">
                </div>

                <button
                    class="w-full bg-[#003f87] text-white py-4 rounded-2xl font-semibold hover:opacity-90 transition">

                    Simpan Perubahan

                </button>

            </div>

        </div>

    </main>

    <!-- SCRIPT GANTI FOTO -->
    <script>

        const profileInput = document.getElementById("profileInput");
        const profilePreview = document.getElementById("profilePreview");

        const savedImage = localStorage.getItem("profileImage");

        if (savedImage) {
            profilePreview.src = savedImage;
        }

        profileInput.addEventListener("change", function () {

            const file = this.files[0];

            if (file) {

                const reader = new FileReader();

                reader.onload = function (e) {

                    profilePreview.src = e.target.result;

                    localStorage.setItem("profileImage", e.target.result);

                }

                reader.readAsDataURL(file);

            }

        });

    </script>

</body>

</html>
