<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TransEdu - Login</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f4f7ff;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden">

        <!-- Header -->
        <div class="text-center px-8 pt-10 pb-6">
            <h1 class="text-4xl font-bold text-blue-700">
                TransEdu
            </h1>

            <p class="text-gray-500 mt-2">
                Akses mudah subsidi transportasi Anda
            </p>
        </div>

        <!-- Toggle -->
        <div class="px-6 mb-8">
            <div class="bg-gray-100 rounded-full p-1 flex">
                <button class="w-1/2 bg-white text-blue-700 font-semibold py-3 rounded-full shadow">
                    Masuk
                </button>

                <button class="w-1/2 text-gray-500 font-medium py-3 rounded-full">
                    Daftar
                </button>
            </div>
        </div>

        <!-- Form -->
        <div class="px-6 pb-10">

            <form action="dashboard.html" method="GET" class="space-y-5">

                <!-- Email -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Email Sekolah
                    </label>

                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
                            mail
                        </span>

                        <input type="email" placeholder="contoh@sekolah.edu" required
                            class="w-full h-12 border border-gray-300 rounded-xl pl-12 pr-4 focus:outline-none focus:ring-2 focus:ring-blue-500" />
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <div class="flex justify-between mb-2">
                        <label class="text-sm font-medium text-gray-700">
                            Kata Sandi
                        </label>

                        <a href="#" class="text-sm text-blue-700 hover:underline">
                            Lupa sandi?
                        </a>
                    </div>

                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
                            lock
                        </span>

                        <input type="password" placeholder="••••••••" required
                            class="w-full h-12 border border-gray-300 rounded-xl pl-12 pr-12 focus:outline-none focus:ring-2 focus:ring-blue-500" />

                        <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400">
                            <span class="material-symbols-outlined">
                                visibility_off
                            </span>
                        </button>
                    </div>
                </div>

                <!-- Remember -->
                <div class="flex items-center gap-2">
                    <input type="checkbox" class="w-4 h-4 text-blue-700 rounded">

                    <label class="text-sm text-gray-600">
                        Ingat saya
                    </label>
                </div>

                <!-- Button -->
                <button type="submit"
                    class="w-full h-12 bg-blue-700 hover:bg-blue-800 transition text-white rounded-full font-semibold shadow-lg">
                    Masuk ke Akun
                </button>

            </form>

            <!-- Divider -->
            <div class="flex items-center gap-4 my-8">
                <div class="flex-1 h-px bg-gray-300"></div>

                <span class="text-sm text-gray-400">
                    Atau masuk dengan
                </span>

                <div class="flex-1 h-px bg-gray-300"></div>
            </div>

            <!-- Social -->
            <div class="grid grid-cols-2 gap-3">

                <!-- GOOGLE -->
                <button onclick="loginGoogle()"
                    class="h-12 border rounded-xl flex items-center justify-center gap-2 hover:bg-gray-50 transition">

                    <img src="https://www.google.com/favicon.ico" class="w-5 h-5" alt="Google" />

                    <span class="text-sm font-medium">
                        Google
                    </span>

                </button>

                <!-- MICROSOFT -->
                <button onclick="loginMicrosoft()"
                    class="h-12 border rounded-xl flex items-center justify-center gap-2 hover:bg-gray-50 transition">

                    <img src="https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg" class="w-5 h-5"
                        alt="Microsoft" />

                    <span class="text-sm font-medium">
                        Microsoft
                    </span>

                </button>

            </div>

            <!-- Footer -->
            <p class="text-center text-sm text-gray-500 mt-8">
                Butuh bantuan?
                <a href="#" class="text-blue-700 font-semibold hover:underline">
                    Hubungi Admin Sekolah
                </a>
            </p>

        </div>

    </div>
    <script>

        function daftar() {

            alert("Pendaftaran berhasil!");

            window.location.href = "dashboard.html";

        }

        function loginGoogle() {

            alert("Login dengan Google berhasil!");

            window.location.href = "dashboard.html";

        }

        function loginMicrosoft() {

            alert("Login dengan Microsoft berhasil!");

            window.location.href = "dashboard.html";

        }

    </script>

</body>

</html>
