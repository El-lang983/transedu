<!-- qr.html -->

<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransEdu - QR Code</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f4f7ff;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col">

    <header class="bg-[#003f87] text-white p-5 shadow-md flex justify-between items-center">
        <h1 class="text-2xl font-bold">QR Scanner</h1>

        <a href="dashboard.html" class="bg-white text-[#003f87] px-4 py-2 rounded-full font-semibold">
            Dashboard
        </a>
    </header>

    <main class="flex-1 flex items-center justify-center p-6">

        <div class="bg-white rounded-3xl shadow-xl p-8 text-center max-w-md w-full">

            <div class="bg-blue-100 w-24 h-24 mx-auto rounded-full flex items-center justify-center">

                <span class="material-symbols-outlined text-[#003f87] text-5xl">
                    qr_code_scanner
                </span>

            </div>

            <h2 class="text-3xl font-bold text-[#003f87] mt-6">
                QR Perjalanan
            </h2>

            <p class="text-gray-500 mt-3">
                Tunjukkan QR ini kepada petugas transportasi.
            </p>

            <div class="bg-gray-100 rounded-3xl p-6 mt-8">

                <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=TRANSEDU-29402"
                    class="mx-auto rounded-2xl">

            </div>

            <button
                class="mt-8 w-full bg-[#003f87] text-white py-4 rounded-2xl font-semibold hover:opacity-90 transition">

                Download QR
            </button>

        </div>

    </main>

</body>

</html>
